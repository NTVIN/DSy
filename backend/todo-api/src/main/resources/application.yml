server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: todo-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tododb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:my-super-secret-jwt-key-must-be-at-least-32-characters-long-for-hs512-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.todo: DEBUG