server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: todo-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tododb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30        # Increase from default (10)
      minimum-idle: 10              # Keep connections ready
      connection-timeout: 30000     # 30 seconds
      idle-timeout: 600000          # 10 minutes
      max-lifetime: 1800000         # 30 minutes

  jpa:
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  # OWASP: Use a strong, randomly generated secret (minimum 512 bits for HS512)
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A}
  # OWASP: Short expiration time (15 minutes)
  expiration: ${JWT_EXPIRATION:900000}
  # Refresh token expiration (7 days)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  # Token issuer
  issuer: ${JWT_ISSUER:todo-api}
  # Token audience
  audience: ${JWT_AUDIENCE:todo-api-users}

logging:
  level:
    com.todo: DEBUG