services:
  postgres:
    image: postgres:latest  # ← Always pulls latest PostgreSQL
    container_name: todo-postgres
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Instance 1
  backend-1:
    build: ./backend
    container_name: todo-backend-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tododb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      JWT_ISSUER: todo-api
      JWT_AUDIENCE: todo-api-users
      SERVER_PORT: 8080
      INSTANCE_NAME: backend-1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Instance 2
  backend-2:
    build: ./backend
    container_name: todo-backend-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tododb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      JWT_ISSUER: todo-api
      JWT_AUDIENCE: todo-api-users
      SERVER_PORT: 8080
      INSTANCE_NAME: backend-2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Instance 3
  backend-3:
    build: ./backend
    container_name: todo-backend-3
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tododb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      JWT_ISSUER: todo-api
      JWT_AUDIENCE: todo-api-users
      SERVER_PORT: 8080
      INSTANCE_NAME: backend-3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx Load Balancer
  load-balancer:
    image: nginx:alpine
    container_name: todo-load-balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend
  frontend:
    build: ./frontend
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - load-balancer
    networks:
      - todo-network

volumes:
  postgres_data:

networks:
  todo-network:
    driver: bridge